services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobskills_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobskills_dev"]
      interval: 3s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      # Force the DB host to be the docker service name, not localhost
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/jobskills_dev
      PYTHONPATH: /app
      RUN_MIGRATIONS: "0"
      START_SERVER: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Prod-shaped: run migrations as a separate one-off task
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/jobskills_dev
    command: ["bash", "-lc", "alembic -c /app/alembic.ini upgrade head"]
    profiles: ["ops"]

  db_test:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobskills_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobskills_test"]
      interval: 3s
      timeout: 3s
      retries: 30
    profiles: ["test"]

  test:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db_test:
        condition: service_healthy
    env_file:
      - backend/.env.test
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db_test:5432/jobskills_test
      PYTHONPATH: /app
    command: ["bash", "-lc", "alembic -c /app/alembic.ini upgrade head && pytest -v -s"]
    profiles: ["test"]



volumes:
  pgdata_test:
  pgdata:
